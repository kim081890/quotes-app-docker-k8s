apiVersion: v1
kind: Service
metadata:
  name: back-external
  labels:
    app.kubernetes.io/name: quotes-app
    app.kubernetes.io/component: api
  annotations:
    description: "External access to API for testing — use ClusterIP 'back' service for internal traffic"
spec:
  selector:
    app: back
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort