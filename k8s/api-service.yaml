apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/name: quotes-app
    app.kubernetes.io/component: api
  annotations:
    description: "DNS alias for back service — provides 'api' hostname for front.py compatibility"
spec:
  selector:
    app: back
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP